<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Giveaway Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <style>
    body {
      background: #0d0f13;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .login-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .login-logo {
      font-size: 3rem;
      text-align: center;
      margin-bottom: 8px;
    }
    .login-title {
      text-align: center;
      color: #f0f6fc;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .login-sub {
      text-align: center;
      color: #8b949e;
      font-size: 0.875rem;
      margin-bottom: 28px;
    }
    .form-control {
      background: #0d1117;
      border-color: #30363d;
      color: #f0f6fc;
    }
    .form-control:focus {
      background: #0d1117;
      border-color: #58a6ff;
      color: #f0f6fc;
      box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
    }
    .btn-login {
      background: #5865f2;
      border: none;
      color: white;
      padding: 10px;
      font-weight: 600;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #4752c4; color: white; }
    label { color: #8b949e; font-size: 0.85rem; font-weight: 500; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">🎉</div>
    <div class="login-title">Giveaway Dashboard</div>
    <div class="login-sub">Sign in to manage your giveaways</div>

    {% if error %}
    <div class="alert alert-danger py-2 px-3 mb-3" style="border-radius:8px; font-size:0.875rem;">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="admin" required autofocus />
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-login w-100">Sign In</button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
